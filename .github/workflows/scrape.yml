name: scrape-srivani-airport

# Cloud capture of the TTD SRIVANI airport token counts.
# Runs every 5 min during the UTC window that covers the IST morning depletion
# (~05:30-12:29 IST). The script self-gates further (skips outside 06:00-12:00
# IST and once the day is sold out), so most out-of-window ticks are cheap no-ops.
# NOTE: GitHub Actions cron is best-effort - runs can be delayed a few minutes or
# occasionally skipped under load. This is the always-on safety net; the local
# launchd job provides finer 2-min detail when the Mac is awake.
on:
  schedule:
    - cron: "*/5 0-6 * * *"   # every 5 min, UTC hours 00-06  (= ~05:30-12:29 IST)
  workflow_dispatch:            # allow manual runs (for testing)

permissions:
  contents: write               # to commit the new CSV rows back to the repo

concurrency:
  group: scrape                 # never let two scrape runs overlap
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: scripts/requirements.txt

      - name: Install deps
        run: pip install -r scripts/requirements.txt

      - name: Scrape
        run: python scripts/scrape.py

      - name: Commit new data (if any)
        run: |
          git config user.name  "srivani-bot"
          git config user.email "actions@users.noreply.github.com"
          if git diff --quiet -- data/; then
            echo "No data change - nothing to commit."
            exit 0
          fi
          git add data/
          git commit -m "data: srivani airport ($(TZ=Asia/Kolkata date '+%Y-%m-%d %H:%M IST'))"
          # rebase over any commits the local hybrid job pushed in the meantime,
          # then push. Retry once on a race.
          for i in 1 2 3; do
            git pull --rebase --autostash origin "${GITHUB_REF_NAME}" && git push && break
            echo "push race, retrying ($i)..."; sleep 3
          done
